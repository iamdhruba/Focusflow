org.gradle.jvmargs=-Xmx4G -Dfile.encoding=UTF-8 -XX:+UseG1GC
android.useAndroidX=true
# Disable parallel build execution on Windows to avoid Gradle daemon
# "Could not close incremental caches" + filesystem path-root mismatch
# crashes that surface when the daemon races on NTFS. Trade-off: slower
# builds, but reliable. Re-enable for Linux/macOS dev hosts if desired.
org.gradle.parallel=false
# Force-disable the Gradle daemon on Windows — the daemon's incremental
# cache can corrupt when R8 minify is flipped on/off across cycles
# (which we did going v1.0.0 -> v1.0.1), causing JVM crashes with
# hs_err_pid*.log dumps. Disabling the daemon forces a clean JVM per
# build, eliminating the cache corruption vector. Cost: ~5s cold start
# per build. The trade-off favors reliability for the release pipeline.
org.gradle.daemon=false
