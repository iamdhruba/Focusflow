name: focusflow
description: FocusFlow — Digital Wellbeing & App Blocker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Environment ─────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── HTTP Client ─────────────────────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── Secure Storage ──────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Permissions ─────────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── UI / Fonts ──────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # ── Foreground Service (Android) ─────────────────────────────────────────────
  flutter_foreground_task: ^8.10.0

  # ── Background Sync ──────────────────────────────────────────────────────────
  workmanager: ^0.9.0

  # ── Local Storage ────────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # ── Utilities ────────────────────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
